---
self-hosted-runner:
  # Labels of self-hosted runner in array of strings.
  labels: []

# Configuration variables in array of strings defined in your repository or
# organization. `null` means disabling configuration variables check.
# Empty array means no configuration variable is allowed.
config-variables: null

# Configuration for file paths. The keys are glob patterns to match to file
# paths relative to the repository root. The values are the configurations for
# the file paths. Note that the path separator is always '/'.
# The following configurations are available.
#
# "ignore" is an array of regular expression patterns. Matched error messages
# are ignored. This is similar to the "-ignore" command line option.
paths:
  .github/workflows/**/*.yml:
    ignore:
      # Remove these ignored errors when actionlint supports `parallel:`, `background:`, `wait:` and `wait-all:`
      - 'unexpected key "background" for step to execute action. expected one of' # [syntax-check]
      - 'unexpected key "background" for step to run shell command. expected one of' # [syntax-check]
      - 'step must run script with "run" section or run action with "uses" section' # [syntax-check]

  .github/workflows/python-code-quality.yml:
    ignore:
      - 'condition "false" is always evaluated to false. remove the if: section' # [if-cond]

  .github/workflows/osgeo4w.yml:
    ignore:
      # Remove these ignored errors when actionlint supports `parallel:`, `background:`, `wait:` and `wait-all:`
      - 'property "msys2" is not defined in object type {}' # [expression]
      - 'property "osgeo4w" is not defined in object type {}' # [expression]
